/* ========== ENTER SCREEN ========== */
#enterOverlay {

    z-index: 1000;

    transform: translateZ(0);

}
#enterOverlay.hidden {

    transform: scale(1.08) translateZ(0);
    -webkit-transform: scale(1.08) translateZ(0);

    visibility: hidden;
}
.enter-text {

    letter-spacing: 0.3em;

    will-change: opacity;
    transform: translateZ(0);
    -webkit-user-select: none;
    user-select: none;
}
@keyframes enterPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}

/* ========== VIDEO BACKGROUND — ULTRA PERFORMANCE ========== */
.video-container {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
    contain: strict;
    background: #000;
    isolation: isolate;
}
.video-container video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    object-fit: cover;
    transform: translate(-50%, -50%) translateZ(0) scale(1.001);
    -webkit-transform: translate(-50%, -50%) translateZ(0) scale(1.001);
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    -webkit-transform-style: preserve-3d;
    transform-style: preserve-3d;
    image-rendering: auto;
    -webkit-image-rendering: auto;
    decoding: async;
    -webkit-playsinline: true;
    playsinline: true;
    x-webkit-airplay: allow;
    preload: auto;
    /* GPU layers */
    -webkit-perspective: 1000;
    perspective: 1000;
}
.video-overlay {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0.12) 100%);
    pointer-events: none;
    contain: strict;
    mix-blend-mode: normal;
}

/* ========== MAIN CONTAINER ========== */
.main-container {
    position: relative;
    z-index: 10;
    width: 90%;
    max-width: 420px;
    perspective: 1200px;
    opacity: 0;
    transition: opacity 0.8s var(--ease-smooth);
    contain: layout style;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.main-container.active {
    opacity: 1;
}

.bio-card {
    background: transparent;
    border: none;
    padding: clamp(1.5rem, 4vh, 2.5rem);
    transform-style: preserve-3d;
    opacity: 0;
    transform: translateY(50px) scale(0.94);
    transition: opacity 1.2s var(--ease-smooth), transform 1.2s var(--ease-smooth);
    will-change: transform, opacity;
    contain: layout style paint;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
}
.bio-card.revealed {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* ========== CARDS (STAGGERED REVEAL) ========== */
.widget-card {

    align-items: center;
    gap: 0.9rem;
    padding: 1rem 1.3rem;

    opacity: 0;
    transform: translateX(-20px);

    will-change: transform;
    contain: layout style;
    position: relative;
    overflow: hidden;
    width: 100%;
    max-width: 380px;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}
.bio-card.revealed .widget-card {
    opacity: 1;
    transform: translateX(0);
}
.widget-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
}
.widget-card:hover {
    transform: translateY(-3px) scale(1.02);
    border-color: rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.06);
}
.widget-card:hover::before {
    opacity: 1;
}

.discord-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;

    border: 1.5px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
    transition: transform 0.5s var(--ease-smooth), border-color 0.5s ease;
    will-change: transform;
    box-shadow: 0 0 15px rgba(255,255,255,0.05);
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}
.widget-card:hover .discord-avatar {
    transform: scale(1.12);
    border-color: rgba(255,255,255,0.35);
}
.discord-info {
    display: flex;
    flex-direction: column;
    min-width: 0;
    flex: 1;
    gap: 2px;
}
.discord-name {
    font-size: 1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.95);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    line-height: 1.3;
}
.discord-status {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    line-height: 1.2;
}
.discord-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    margin-left: auto;
    opacity: 0.9;
    transition: opacity 0.4s var(--ease-smooth), transform 0.4s var(--ease-smooth);
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}
.widget-card:hover .discord-icon {
    opacity: 1;
    transform: scale(1.1);
}

/* ========== RICH PRESENCE — EXACT DISCORD ========== */
.rp-card {
    padding: 1rem 1.3rem;

}
.rp-card::before {

.rp-card:hover {

    border-color: rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.06);
}
.rp-card:hover::before {
    opacity: 1;
}

.rp-header {

.rp-body {

.rp-icon-wrap {

.rp-icon {

.rp-info {

.rp-title {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 16px;
    font-weight: 700;

.rp-detail {

.rp-state {

/* TIME — BOLD, #3BA55D, NO ELAPSED */

}
.rp-gamepad img {

.section-label {

.grid-flex {

.icon-item {

.bio-card.revealed .icon-item {

.icon-item:hover {

.icon-item img, .icon-item svg { width: 100%; height: 100%; object-fit: contain; }
.icon-item.team-btn { border-radius: 50%; width: 46px; height: 46px; padding: 0px; overflow: hidden; }

/* ========== RESPONSIVE ========== */
@media (max-width: 480px) {
    .main-container { width: 92%; }
    .widget-card, .rp-card, .stats, .section { max-width: 100%; }
    .icon-item { width: 36px; height: 36px; }
    .icon-item.team-btn { width: 42px; height: 42px; }
    .rp-icon-wrap { width: 50px; height: 50px; }
    .rp-icon { width: 50px; height: 50px; padding: 4px; }
    .rp-small-icon { width: 16px; height: 16px; }
    .discord-avatar { width: 44px; height: 44px; }
    .discord-name { font-size: 0.95rem; }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
    .video-container video { transform: none !important; }
}

/* ========== TOUCH OPTIMIZATION ========== */
@media (hover: none) and (pointer: coarse) {
    .widget-card:hover, .rp-card:hover, .icon-item:hover {
        transform: none !important;
    }
    .widget-card:hover::before, .rp-card:hover::before {
        opacity: 0 !important;
    }
}
</style>

<!-- AUDIO -->
<audio id="bgAudio" preload="auto" crossorigin="anonymous" loop>
    <source src="https://files.catbox.moe/s49we2.mp3" type="audio/mpeg">
</audio>

<script>
// ========== ULTRA PERFORMANCE CONFIG ==========
const CONFIG = { 
    userId: "1450800858018087018",
    videoSrc: "https://files.catbox.moe/kdasz6.mp4",
    audioSrc: "https://files.catbox.moe/s49we2.mp3"
};

const audio = document.getElementById('bgAudio');
const video = document.getElementById('bgVideo');
const overlay = document.getElementById('enterOverlay');
const main = document.getElementById('mainContainer');
const bioCard = document.getElementById('bioCard');
let entered = false;
let rafIds = [];
let intervals = [];

// ========== RAF HELPER ==========
function safeRAF(fn) {
    const id = requestAnimationFrame(fn);
    rafIds.push(id);
    return id;
}
function safeInterval(fn, ms) {
    const id = setInterval(fn, ms);
    intervals.push(id);
    return id;
}
function cleanup() {
    rafIds.forEach(id => cancelAnimationFrame(id));
    intervals.forEach(id => clearInterval(id));
    rafIds = [];
    intervals = [];
}

// ========== ENTER SYSTEM ==========
function doEnter() {
    if (entered) return;
    entered = true;
    overlay.classList.add('hidden');
    main.classList.add('active');

    video.load();
    video.playbackRate = 1.0;
    video.play().then(() => {
        seamlessVideoLoop();
    }).catch(() => {});

    audio.load();
    audio.volume = 0.8;
    audio.play().catch(() => {});

    safeRAF(() => {
        setTimeout(() => {
            bioCard.classList.add('revealed');
        }, 200);
    });
}

overlay.addEventListener('click', doEnter);
document.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.code === 'Enter') && !entered) doEnter();
});

// ========== SEAMLESS VIDEO LOOP — ULTRA SMOOTH ==========
let lastVideoTime = 0;
function seamlessVideoLoop() {
    if (!video.duration) {
        safeRAF(seamlessVideoLoop);
        return;
    }
    const remaining = video.duration - video.currentTime;
    if (remaining <= 0.06 || video.currentTime < lastVideoTime) {
        video.currentTime = 0.02;
        video.play().catch(() => {});
    }
    lastVideoTime = video.currentTime;
    safeRAF(seamlessVideoLoop);
}

// ========== AUDIO LOOP BACKUP ==========
audio.addEventListener('ended', () => {
    audio.currentTime = 0;
    audio.play().catch(() => {});
});

// ========== DISCORD FETCH ==========
const statusColors = { online: '#23a55a', idle: '#f0b232', dnd: '#f23f43', offline: '#80848e' };

async function fetchDiscord() {
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        const response = await fetch(`https://api.lanyard.rest/v1/users/${CONFIG.userId}`, { signal: controller.signal });
        clearTimeout(timeout);
        const data = await response.json();
        if (data.success && data.data) {
            const u = data.data;
            const nameEl = document.getElementById('discordName');
            if (nameEl) nameEl.textContent = u.discord_user.global_name || u.discord_user.username;
            const avatarHash = u.discord_user.avatar;
            if (avatarHash) {
                const avatarUrl = `https://cdn.discordapp.com/avatars/${CONFIG.userId}/${avatarHash}.webp?size=256`;
                const avatarImg = document.getElementById('discordAvatar');
                if (avatarImg) avatarImg.src = avatarUrl;
            }
            const currentStatus = u.discord_status;
            const statusEl = document.getElementById('discordStatus');
            if (statusEl) {
                statusEl.textContent = currentStatus.toUpperCase();
                statusEl.style.color = statusColors[currentStatus] || '#80848e';
            }
        }
    } catch (err) { console.log("Lanyard error:", err); }
}

// ========== VS CODE RP — GLOBAL TIME (47:32:19+) ==========
const GLOBAL_START_TIME = new Date('2026-07-01T04:40:41Z').getTime();
let serverOffset = 0;
let serverTimeSynced = false;

async function syncServerTime() {
    try {
        const localStart = performance.now();
        const res = await fetch('https://worldtimeapi.org/api/ip', { cache: 'no-store' });
        const data = await res.json();
        const serverUnix = data.unixtime * 1000;
        const localEnd = performance.now();
        const latency = (localEnd - localStart) / 2;
        serverOffset = (serverUnix + latency) - Date.now();
        serverTimeSynced = true;
    } catch (e) {
        serverOffset = 0;
        serverTimeSynced = false;
    }
}

function getGlobalTime() {
    return Date.now() + serverOffset;
}

function formatElapsed(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
}

function updateRPTime() {
    const el = document.getElementById('rpTimeText');
    if (!el) return;
    const elapsed = getGlobalTime() - GLOBAL_START_TIME;
    el.textContent = formatElapsed(elapsed);
}

// ========== GLOBAL VIEWS — CACHE + GLOBAL ==========
const VIEW_BASE_OFFSET = 9721;
const VIEW_CACHE_KEY = 'draigy_views_cache';

async function initGlobalViews() {
    const viewEl = document.getElementById('viewCount');
    if (!viewEl) return;

    // 1. Show cached value immediately (never blank)
    const cached = localStorage.getItem(VIEW_CACHE_KEY);
    if (cached) {
        viewEl.textContent = cached;
    } else {
        viewEl.textContent = VIEW_BASE_OFFSET.toLocaleString();
    }

    // 2. Fetch from API in background
    async function fetchGlobalCount() {
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 6000);
            const res = await fetch('https://api.countapi.xyz/hit/draigy-bio-2026/visits', { signal: controller.signal });
            clearTimeout(timeout);
            if (res.ok) {
                const data = await res.json();
                const total = (data.value || 0) + VIEW_BASE_OFFSET;
                const formatted = total.toLocaleString();
                viewEl.textContent = formatted;
                localStorage.setItem(VIEW_CACHE_KEY, formatted);
                return true;
            }
        } catch (e) {
            console.warn('Count API failed:', e.message);
        }
        return false;
    }

    // 3. Try primary API
    let success = await fetchGlobalCount();

    // 4. Retry once after 2s if failed
    if (!success) {
        setTimeout(async () => {
            success = await fetchGlobalCount();
            // 5. Backup API if still failed
            if (!success) {
                try {
                    const backup = await fetch('https://api.countapi.xyz/get/draigy-bio-2026/visits', { signal: (new AbortController()).signal });
                    if (backup.ok) {
                        const data = await backup.json();
                        const total = (data.value || 0) + VIEW_BASE_OFFSET;
                        const formatted = total.toLocaleString();
                        viewEl.textContent = formatted;
                        localStorage.setItem(VIEW_CACHE_KEY, formatted);
                    }
                } catch (e2) {}
            }
        }, 2000);
    }
}

// ========== PARALLAX MOUSE — 240FPS READY ==========
let mouseX = 0, mouseY = 0;
let currentX = 0, currentY = 0;
let targetRotateX = 0, targetRotateY = 0;
let currentRotateX = 0, currentRotateY = 0;
let mouseActive = false;
let mouseTimeout = null;

document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    mouseActive = true;
    clearTimeout(mouseTimeout);
    mouseTimeout = setTimeout(() => { mouseActive = false; }, 100);
});

function animateFrame() {
    if (mouseActive) {
        currentX += (mouseX - currentX) * 0.04;
        currentY += (mouseY - currentY) * 0.04;
        targetRotateX = currentY * -2;
        targetRotateY = currentX * 2;
        currentRotateX += (targetRotateX - currentRotateX) * 0.08;
        currentRotateY += (targetRotateY - currentRotateY) * 0.08;
        if (bioCard) {
            bioCard.style.transform = `perspective(1200px) rotateX(${currentRotateX.toFixed(2)}deg) rotateY(${currentRotateY.toFixed(2)}deg) translateZ(0)`;
        }
    }
    safeRAF(animateFrame);
}

// ========== VIDEO SMOOTH SCALE ==========
let videoScale = 1.0;
let scaleTarget = 1.02;
function animateVideo() {
    videoScale += (scaleTarget - videoScale) * 0.01;
    if (Math.abs(scaleTarget - videoScale) < 0.001) {
        scaleTarget = scaleTarget === 1.02 ? 1.0 : 1.02;
    }
    if (video) {
        video.style.transform = `translate(-50%, -50%) scale(${videoScale.toFixed(4)}) translateZ(0)`;
    }
    safeRAF(animateVideo);
}

// ========== RESET ON LEAVE ==========
document.addEventListener('mouseleave', () => {
    mouseX = 0;
    mouseY = 0;
});

// ========== VISIBILITY API — ULTRA EFFICIENT ==========
let wasHidden = false;
document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        wasHidden = true;
        if (video) video.pause();
        if (audio) audio.pause();
    } else {
        if (video) video.play().catch(() => {});
        if (audio) audio.play().catch(() => {});
        if (wasHidden) {
            wasHidden = false;
            syncServerTime();
        }
    }
});

// ========== INTERSECTION OBSERVER — LAZY LOAD ==========
const imageObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src) {
                img.src = img.dataset.src;
                img.removeAttribute('data-src');
            }
            imageObserver.unobserve(img);
        }
    });
}, { rootMargin: '50px' });

document.querySelectorAll('img[loading="lazy"]').forEach(img => {
    if (img.src) {
        img.dataset.src = img.src;
        img.src = '';
        imageObserver.observe(img);
    }
});

// ========== ERROR RECOVERY ==========
window.addEventListener('error', (e) => {
    console.warn('Bio error:', e.message);
});
window.addEventListener('unhandledrejection', (e) => {
    console.warn('Bio promise error:', e.reason);
});

// ========== INIT ==========
window.addEventListener('DOMContentLoaded', () => {
    video.load();
    video.playbackRate = 1.0;
    audio.load();
    syncServerTime().then(() => {
        updateRPTime();
        safeInterval(updateRPTime, 1000);
    });
    fetchDiscord();
    initGlobalViews();
    safeInterval(fetchDiscord, 15000);
    safeInterval(syncServerTime, 300000); // resync every 5 min
    safeRAF(animateFrame);
    safeRAF(animateVideo);
});

// ========== BEFORE UNLOAD CLEANUP ==========
window.addEventListener('beforeunload', cleanup);
</script>
</body>
</html>
